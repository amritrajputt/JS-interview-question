<!-- Event Bubbling vs Capturing
Concept
Jab tum kisi element pe click karte ho jo nested hai (jaise ek button jo ek div ke andar hai, jo aur bade container ke andar hai), event teen phases mein travel karta hai:

Capturing phase — event top se neeche jaata hai (document → parent → child → target element)
Target phase — event apne actual target pe pahunchta hai
Bubbling phase — event neeche se upar jaata hai (target → parent → parent → document) -->
